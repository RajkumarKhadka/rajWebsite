<svg width="64" height="64" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rk-slash" x1="22" y1="22" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF9A3C"/>
      <stop offset="100%" stop-color="#C85F00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="44" height="44" rx="10" fill="#0A0F1E"/>

  <!-- Central spine — right side of Я, left side of K -->
  <line x1="22" y1="5" x2="22" y2="39" stroke="white" stroke-width="6" stroke-linecap="round"/>

  <!-- Я bowl: spine-top arcs left, returns to spine-mid -->
  <path d="M 22 5 Q 3 5 3 14 Q 3 23 22 23" stroke="white" stroke-width="5.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Я leg: spine-mid to lower-left -->
  <line x1="22" y1="23" x2="5" y2="39" stroke="white" stroke-width="5.5" stroke-linecap="round"/>

  <!-- K upper arm: spine-mid to upper-right -->
  <line x1="22" y1="23" x2="40" y2="5" stroke="white" stroke-width="5.5" stroke-linecap="round"/>

  <!-- K lower slash arm: spine-mid to lower-right (orange) -->
  <line x1="22" y1="23" x2="40" y2="39" stroke="url(#rk-slash)" stroke-width="5.5" stroke-linecap="round"/>
</svg>
